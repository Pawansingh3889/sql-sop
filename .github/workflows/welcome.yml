name: Welcome first-time contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    # Skip the welcome bot for anyone with write access (owner, collaborators,
    # members). The bot should only greet external first-time contributors,
    # not the maintainer opening a roadmap issue.
    if: >-
      github.event.issue.author_association != 'OWNER' &&
      github.event.issue.author_association != 'COLLABORATOR' &&
      github.event.issue.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'COLLABORATOR' &&
      github.event.pull_request.author_association != 'MEMBER'
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Thanks for opening your first issue on sql-sop! A few pointers:

            - If this is a **security / rule-bypass** report, please close
              this issue and file a [private advisory](../../security/advisories/new)
              instead — see [`SECURITY.md`](../blob/main/SECURITY.md).
            - If you're proposing a **new rule**, the shape is in
              [`CONTRIBUTING.md`](../blob/main/CONTRIBUTING.md) § "Adding a new rule".
            - If this is a **false positive or false negative**, include
              the exact SQL, rule ID, sql-sop version, and your
              `.pre-commit-config.yaml` (or CI workflow step).

            The maintainer replies within 7 calendar days
            (see [`GOVERNANCE.md`](../blob/main/GOVERNANCE.md)).
          pr_message: |
            Thanks for your first PR on sql-sop! Quick checks:

            - `pytest -q` and `ruff check .` pass locally
            - Every new rule has both a "fires on bad SQL" test AND a
              "does NOT fire on safe SQL" test
            - Rule IDs (`E001`, `W001`, …) are public API — don't renumber
              or rename existing ones without the deprecation process in
              [`GOVERNANCE.md`](../blob/main/GOVERNANCE.md)
            - `CHANGELOG.md` `[Unreleased]` entry for any user-facing change

            First-PR-wins on the linked issue applies for 7 days. The
            maintainer will review within 14 days of your last response.
